version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: root
      JWT_SECRET: change_me
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
    command: sh -c "node -e \"require('./db').ensureSchema().then(()=>console.log('migrations ok')).catch(e=>{console.error(e);process.exit(1)})\" && node index.js"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
